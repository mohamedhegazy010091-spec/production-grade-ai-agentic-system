name: web-assistant

# ================================
# Docker Compose Configuration
# ================================
# this file defines all services required to run the
# application locally or in single-node environments
services:
  db:
    image: pgvector/pgvector:pg16  # postgresSQL 16 with pgvector extension
    environment:
      - POSTGRES_USER=${POSTGRES_USER}          # Database username
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}  # Database password
      - POSTGRES_DB=${POSTGRES_DB}              # Database name

    ports:
      - "5432:5432"  # Expose PostgreSQL port for local access
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Persist database data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always 
    networks:
      - backend


networks:
  backend:
    driver: bridge

volumes:
  postgres_data: